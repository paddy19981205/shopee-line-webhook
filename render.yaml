services:
  - type: web
    name: shopee-line-webhook
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_ADMIN_TOKEN
        sync: false
      - key: LINE_NOTIFY_TARGET_ID
        sync: false
